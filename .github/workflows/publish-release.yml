name: Publish Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  create-release:
    runs-on: windows-latest
    name: Build and Publish Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: powershell
        run: |
          $tag = "${{ github.ref }}" -replace "refs/tags/", ""
          $version = $tag -replace "^v", ""
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare release files
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundlePath = "src-tauri/target/release/bundle"

          # Create release artifacts directory
          New-Item -ItemType Directory -Path "release-artifacts" -Force | Out-Null

          # Copy MSI
          $msiFiles = Get-ChildItem -Path "$bundlePath/msi/" -Filter "*.msi"
          foreach ($file in $msiFiles) {
            Copy-Item -Path $file.FullName -Destination "release-artifacts/"
            Write-Host "✅ Copied MSI: $($file.Name)"
          }

          # Copy NSIS EXE
          $exeFiles = Get-ChildItem -Path "$bundlePath/nsis/" -Filter "*.exe"
          foreach ($file in $exeFiles) {
            Copy-Item -Path $file.FullName -Destination "release-artifacts/"
            Write-Host "✅ Copied EXE: $($file.Name)"
          }

          # List all artifacts
          Write-Host "`nRelease artifacts:"
          Get-ChildItem -Path "release-artifacts/" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  - $($_.Name) ($size MB)"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to latest.json for auto-update
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $msiFile = Get-ChildItem -Path "release-artifacts/" -Filter "*.msi" | Select-Object -First 1

          if ($null -eq $msiFile) {
            Write-Host "❌ MSI file not found!"
            exit 1
          }

          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/v$version/$($msiFile.Name)"
          $signature = ""  # 需要使用 cargo tauri signer sign 生成

          $latestJson = @{
            version = $version
            notes = "Release $version"
            pub_date = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          }

          $latestJson | ConvertTo-Json | Out-File "latest.json" -Encoding UTF8
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

      - name: Build release summary
        if: success()
        shell: powershell
        run: |
          Write-Host "🎉 Release published successfully!"
          Write-Host ""
          Write-Host "Release Info:"
          Write-Host "  Tag: ${{ steps.version.outputs.tag }}"
          Write-Host "  Version: ${{ steps.version.outputs.version }}"
          Write-Host "  URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
