name: 🚀 Publish Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    name: 🪟 Build Windows Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Prepare Windows artifacts
        shell: powershell
        run: |
          Write-Host "📦 Preparing Windows artifacts..." -ForegroundColor Cyan
          $bundlePath = "src-tauri/target/release/bundle"
          New-Item -ItemType Directory -Path "windows-x64-builds" -Force | Out-Null

          # Copy MSI
          Get-ChildItem -Path "$bundlePath/msi/" -Filter "*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "windows-x64-builds/"
            Write-Host "✅ Included: $($_.Name)"
          }

          # Copy NSIS EXE
          Get-ChildItem -Path "$bundlePath/nsis/" -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "windows-x64-builds/"
            Write-Host "✅ Included: $($_.Name)"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-builds
          path: windows-x64-builds/

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            label: Apple Silicon
          - target: x86_64-apple-darwin
            arch: x86_64
            label: Intel
    name: 🍎 Build macOS (${{ matrix.label }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Prepare macOS artifacts
        run: |
          echo "📦 Preparing macOS artifacts..."
          bundlePath="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p macos-builds

          if [ -d "$bundlePath/dmg" ]; then
            cp "$bundlePath/dmg"/* macos-builds/ 2>/dev/null || true
            ls -lh macos-builds/ | awk '{print "✅ Included: " $NF}'
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-builds
          path: macos-builds/

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    name: 📤 Publish to GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref }}"
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-builds
          path: release-files/windows/

      - name: Download macOS Apple Silicon artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-aarch64-builds
          path: release-files/macos/

      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-builds
          path: release-files/macos/

      - name: Prepare release notes
        run: |
          cat > release-notes.md << 'EOF'
          # OpenClaw 安装器 ${{ steps.version.outputs.version }}

          ## 📥 下载

          ### 🪟 Windows
          - **OpenClaw 安装器_x64.msi** - 推荐使用（Windows Installer）
          - **OpenClaw 安装器_x64.exe** - NSIS 便携版

          ### 🍎 macOS
          - **OpenClaw 安装器_aarch64.dmg** - Apple Silicon (M1/M2/M3+)
          - **OpenClaw 安装器_x64.dmg** - Intel Mac

          > ⚠️ 首次打开如提示"已损坏"，请在终端运行：`sudo xattr -rd com.apple.quarantine /Applications/OpenClaw\ 安装器.app`

          ## ✨ 功能特性

          ✅ 跨平台支持（Windows / macOS / Linux）
          ✅ WSL2 自动检测和安装
          ✅ Node.js 环境管理
          ✅ Gateway 服务注册
          ✅ 管理员权限检查
          ✅ 友好的错误提示

          ## 🚀 快速开始

          1. 从上方选择对应系统的安装包
          2. 下载并运行安装程序
          3. 跟随安装向导完成配置
          4. 重启应用即可使用

          ## 📖 文档

          - [编译指南](https://github.com/${{ github.repository }}/blob/main/COMPILE_WINDOWS.md)
          - [Windows 测试指南](https://github.com/${{ github.repository }}/blob/main/WINDOWS_TEST_GUIDE.md)
          - [项目主页](https://github.com/${{ github.repository }}/blob/main/docs/PROJECT.md)

          ## 🙏 反馈

          遇到问题？请在 [Issues](https://github.com/${{ github.repository }}/issues) 中反馈。
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "🎉 Release Published Successfully!"
          echo ""
          echo "📋 Release Info:"
          echo "  Tag: ${{ steps.version.outputs.tag }}"
          echo "  Version: ${{ steps.version.outputs.version }}"
          echo "  URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          echo ""
          echo "📦 Files:"
          find release-files -type f | while read f; do
            size=$(du -h "$f" | cut -f1)
            echo "  - $(basename $f) ($size)"
          done
